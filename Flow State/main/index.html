<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flow State</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Theme before paint — no flash -->
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Gradient mesh background ── -->
  <div class="bg-mesh">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>

  <!-- ── Nav ── -->
  <nav class="nav anim-1">
    <span class="wordmark">Flow State</span>
    <button class="glass-icon-btn" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle theme">
      <svg id="iconMoon" width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M12.5 9A6 6 0 0 1 5 1.5a6 6 0 1 0 7.5 7.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="iconSun" width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:none">
        <circle cx="7.5" cy="7.5" r="2.8" stroke="currentColor" stroke-width="1.4"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3.05 3.05l1.06 1.06M10.89 10.89l1.06 1.06M3.05 11.95l1.06-1.06M10.89 4.11l1.06-1.06"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </nav>

  <!-- ── Hero ── -->
  <main class="hero">

    <p class="eyebrow anim-2">Deep work · One session at a time</p>

    <h1 class="headline anim-3">
      Your time,<br>
      <em>harmonized.</em>
    </h1>

    <!-- Gold divider -->
    <div class="gold-line anim-4"></div>

    <p class="subtext anim-4">
      A quiet space to enter deep focus.<br>No noise, no distraction.
    </p>

    <!-- ── Liquid Glass CTA card ── -->
    <a href="pomodoro.html" class="glass-cta anim-5">
      <div class="glass-cta-inner">
        <span class="cta-label">Begin session</span>
        <div class="cta-arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </a>

  </main>

  <!-- ── Footer ── -->
  <footer class="footer anim-5">
    <span>© 2025 Flow State</span>
    <span>v 2.0</span>
  </footer>

  <script src="theme.js"></script>
</body>
</html>
