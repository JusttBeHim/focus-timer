<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flow State – Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
  <link rel="stylesheet" href="stylepomo.css">
</head>
<body>

  <!-- ── Background mesh ── -->
  <div class="bg-mesh">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
  </div>

  <!-- ── Nav ── -->
  <nav class="nav anim-1">
    <a href="index.html" class="glass-back">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M12 7.5H3M7 3.5L3 7.5l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Back</span>
    </a>
    <span class="wordmark">Flow State</span>
    <button class="glass-icon-btn" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle theme">
      <svg id="iconMoon" width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M12.5 9A6 6 0 0 1 5 1.5a6 6 0 1 0 7.5 7.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="iconSun" width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:none">
        <circle cx="7.5" cy="7.5" r="2.8" stroke="currentColor" stroke-width="1.4"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3.05 3.05l1.06 1.06M10.89 10.89l1.06 1.06M3.05 11.95l1.06-1.06M10.89 4.11l1.06-1.06"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
  </nav>

  <!-- ── Main Glass Card ── -->
  <main class="main-wrap">
    <div class="glass-card anim-2">

      <!-- State label -->
      <p class="state-label" id="stateLabel">Ready</p>

      <!-- Ring timer -->
      <div class="ring-wrap" id="ringContainer">
        <svg class="ring-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <circle cx="120" cy="120" r="104" class="ring-track"/>
          <circle cx="120" cy="120" r="104" class="ring-prog" id="ringProg"/>
          <circle cx="120" cy="16" r="6" class="ring-dot" id="dotIndicator"/>
        </svg>
        <div class="timer-face">
          <div class="timer-num" id="timerDisplay">25:00</div>
          <div class="timer-sub" id="modeTag">Focus</div>
        </div>
      </div>

      <!-- Duration select -->
      <select id="timeSelect" class="glass-select">
        <option value="25">25 min</option>
        <option value="30">30 min</option>
        <option value="35">35 min</option>
        <option value="40">40 min</option>
        <option value="45">45 min</option>
        <option value="50">50 min</option>
        <option value="55">55 min</option>
        <option value="60">60 min</option>
      </select>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-ghost" onclick="resetTimer()" title="Reset (R)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1.5 8a6.5 6.5 0 1 0 1.3-3.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M1.5 2.5V6H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="ctrl-primary" id="startPauseBtn" onclick="toggleTimer()">Start</button>

        <button class="ctrl-ghost" onclick="skipSession()" title="Skip session">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2.5 3.5l9 4.5-9 4.5V3.5zM14 3.5v9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Session dots -->
      <div class="session-dots" id="sessionDots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div><!-- /glass-card -->
  </main>

  <!-- Keyboard hint -->
  <footer class="footer anim-1">
    Space · start/pause &nbsp;|&nbsp; R · reset
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toastMsg"></span></div>

  <script src="theme.js"></script>
  <script src="pomo.js"></script>
</body>
</html>
