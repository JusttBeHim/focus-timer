<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flow State – Focus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: '#f7ba5e',
              ink: '#1a1714',
              parchment: '#faf9f6',
              muted: '#9c9189',
            },
            fontFamily: {
              display: ['"Cormorant Garamond"', 'serif'],
              body: ['"DM Sans"', 'sans-serif'],
            },
            animation: {
              'fade-up-1': 'fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.0s both',
              'fade-up-2': 'fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.12s both',
              'fade-up-3': 'fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.24s both',
              'fade-up-4': 'fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.36s both',
              'fade-up-5': 'fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.48s both',
              'breathe':   'breathe 4s ease-in-out infinite',
              'complete':  'completeFlash 0.6s ease both',
              'orb-drift':  'orbDrift 22s ease-in-out infinite alternate',
              'orb-drift2': 'orbDrift2 28s ease-in-out infinite alternate',
            },
            keyframes: {
              fadeUp: {
                from: { opacity: '0', transform: 'translateY(18px)' },
                to:   { opacity: '1', transform: 'translateY(0)' },
              },
              breathe: {
                '0%,100%': { transform: 'scale(1)', opacity: '0.85' },
                '50%':     { transform: 'scale(1.015)', opacity: '1' },
              },
              completeFlash: {
                '0%':   { transform: 'scale(1)' },
                '40%':  { transform: 'scale(1.04)' },
                '100%': { transform: 'scale(1)' },
              },
              orbDrift: {
                from: { transform: 'translate(0,0) scale(1)' },
                to:   { transform: 'translate(50px,70px) scale(1.1)' },
              },
              orbDrift2: {
                from: { transform: 'translate(0,0) scale(1)' },
                to:   { transform: 'translate(-40px,-50px) scale(1.08)' },
              },
            },
          },
        },
      }
    </script>
    <link href="stylepomo.css" rel="stylesheet">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
  </head>
  <body class="font-body min-h-screen overflow-hidden relative flex flex-col select-none">

    <div class="grain"></div>

    <!-- Ambient orbs -->
    <div class="fixed pointer-events-none" style="width:700px;height:700px;top:-280px;left:-200px;background:radial-gradient(circle,rgba(247,186,94,0.12) 0%,transparent 65%);border-radius:50%;animation:orbDrift 22s ease-in-out infinite alternate;"></div>
    <div class="fixed pointer-events-none" style="width:500px;height:500px;bottom:-200px;right:-140px;background:radial-gradient(circle,rgba(247,186,94,0.08) 0%,transparent 65%);border-radius:50%;animation:orbDrift2 28s ease-in-out infinite alternate;"></div>

    <!-- Nav -->
    <nav class="relative z-10 flex justify-between items-center px-10 pt-9 animate-fade-up-1">
      <a href="index.html" class="back-link">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M12 7.5H3M7 3.5L3 7.5l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Back</span>
      </a>
      <span class="font-display text-sm tracking-[0.28em] uppercase font-light" style="color:var(--muted)">Flow State</span>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">
        <svg id="iconSun" width="15" height="15" viewBox="0 0 15 15" fill="none" style="display:none">
          <circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/>
          <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3.05 3.05l1.06 1.06M10.89 10.89l1.06 1.06M3.05 11.95l1.06-1.06M10.89 4.11l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <svg id="iconMoon" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M12.5 9A6 6 0 0 1 5 1.5a6 6 0 1 0 7.5 7.5z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </nav>

    <!-- Main -->
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center gap-8 px-6">

      <!-- State label -->
      <p class="font-body text-[11px] tracking-[0.28em] uppercase text-muted animate-fade-up-2 transition-all duration-500" id="stateLabel">Ready</p>

      <!-- Ring + Timer -->
      <div class="ring-container animate-fade-up-3" id="ringContainer">
        <svg class="ring-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <!-- Track -->
          <circle cx="120" cy="120" r="104" class="ring-track"/>
          <!-- Progress -->
          <circle cx="120" cy="120" r="104" class="ring-prog" id="ringProg"/>
          <!-- Gold dot indicator -->
          <circle cx="120" cy="16" r="5" fill="#f7ba5e" id="dotIndicator" class="transition-all duration-1000"/>
        </svg>
        <div class="timer-face">
          <div class="font-display font-light timer-num" id="timerDisplay">25:00</div>
          <div class="font-body font-light text-[11px] tracking-[0.2em] uppercase text-muted mt-1" id="modeTag">Focus</div>
        </div>
      </div>

      <!-- Duration select -->
      <div class="animate-fade-up-4">
        <select id="timeSelect" class="duration-select">
          <option value="25">25 min</option>
          <option value="30">30 min</option>
          <option value="35">35 min</option>
          <option value="40">40 min</option>
          <option value="45">45 min</option>
          <option value="50">50 min</option>
          <option value="55">55 min</option>
          <option value="60">60 min</option>
        </select>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-4 animate-fade-up-5">
        <button class="ctrl-ghost" onclick="resetTimer()" title="Reset (R)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M1.5 7.5a6 6 0 1 0 1.2-3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M1.5 2v3.5H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="ctrl-primary" id="startPauseBtn" onclick="toggleTimer()">Start</button>
        <button class="ctrl-ghost" onclick="skipSession()" title="Skip session">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M2 3l8 4.5L2 12V3zM13 3v9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Session dots -->
      <div class="flex gap-2 items-center animate-fade-up-5" id="sessionDots">
        <div class="session-dot active"></div>
        <div class="session-dot"></div>
        <div class="session-dot"></div>
        <div class="session-dot"></div>
      </div>

    </main>

    <!-- Keyboard hint -->
    <footer class="relative z-10 flex justify-center pb-7 animate-fade-up-5">
      <span class="font-body text-[11px] text-muted opacity-40 tracking-widest">
        Space · start/pause &nbsp;|&nbsp; R · reset
      </span>
    </footer>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden">
      <span id="toastMsg">Session complete!</span>
    </div>

    <script src="theme.js"></script>
    <script src="pomo.js"></script>
  </body>
</html>
